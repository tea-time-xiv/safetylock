name: Build SafetyLockPlugin

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:

  build:
    runs-on: windows-2022

    env:
      Solution_Name: SafetyLockPlugin

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Download Dalamud
      run: |
        Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
        Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

    - name: Build with dotnet
      run: dotnet build --configuration Release

    - name: Package plugin
      run: |
        Push-Location ".\SafetyLockPlugin\bin\x64\Release"
        Compress-Archive -Path "SafetyLockPlugin.dll", "SafetyLockPlugin.json", "images" -DestinationPath "$env:GITHUB_WORKSPACE\SafetyLockPlugin.zip"
        Pop-Location

    - name: Store artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SafetyLockPlugin
        path: SafetyLockPlugin.zip
        if-no-files-found: error
        retention-days: 1

    - name: Release
      if: github.event_name == 'push'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "SafetyLockPlugin.zip"
        tag: latest
        allowUpdates: true
        removeArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
